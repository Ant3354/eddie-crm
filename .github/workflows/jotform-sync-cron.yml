# External cron for Hobby: Vercel only allows one cron run per day per job.
# This workflow calls your production JotForm inbox sync every 30 minutes.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   EDDIE_CRM_BASE_URL  e.g. https://eddie-crm-khaki.vercel.app  (no trailing slash)
#   CRON_SECRET         must match CRON_SECRET on Vercel (same value in Production + Preview)
name: JotForm inbox sync (cron)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/jotform-sync
        env:
          BASE: ${{ secrets.EDDIE_CRM_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "$BASE" ] || [ -z "$SECRET" ]; then
            echo "Missing EDDIE_CRM_BASE_URL or CRON_SECRET repository secrets."
            exit 1
          fi
          BASE="${BASE%/}"
          code=$(curl -sS -o /tmp/jotform-sync-body.txt -w "%{http_code}" \
            -X POST "$BASE/api/cron/jotform-sync" \
            -H "Authorization: Bearer $SECRET" \
            -H "Accept: application/json")
          echo "HTTP $code"
          cat /tmp/jotform-sync-body.txt
          if [ "$code" != "200" ]; then
            exit 1
          fi
